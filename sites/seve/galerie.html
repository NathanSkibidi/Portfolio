  <link rel="stylesheet" href="shared.css">
  <style>
    .gallery-masonry { columns:3; column-gap:12px; padding:48px clamp(24px,3vw,48px) 80px; max-width:1400px; margin:0 auto; }
    .gallery-masonry-item { break-inside:avoid; margin-bottom:12px; border-radius:4px; overflow:hidden; position:relative; cursor:pointer; }
    .gallery-masonry-item img { display:block; width:100%; height:auto; transition:transform 0.6s var(--ease-out-expo); }
    .gallery-masonry-item:hover img { transform:scale(1.04); }
    .gallery-masonry-item::after { content:''; position:absolute; inset:0; background:rgba(10,10,8,0); transition:background 0.4s; }
    .gallery-masonry-item:hover::after { background:rgba(10,10,8,0.2); }
    @media(max-width:768px){ .gallery-masonry{columns:2;column-gap:8px;} .gallery-masonry-item{margin-bottom:8px;} }
    @media(max-width:480px){ .gallery-masonry{columns:1;} }
    .resa-cta-section { text-align:center; padding:0 24px clamp(60px,8vh,100px); }
  </style>
</head>
